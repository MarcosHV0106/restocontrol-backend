<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <!-- Navbar Fragment -->
    <nav th:fragment="navbar" class="navbar-custom d-flex justify-content-between align-items-center p-3 bg-white border-bottom shadow-sm">
        
        <!-- Left Section: Date -->
        <div class="navbar-left">
            <div class="d-flex align-items-center bg-light px-3 py-2 rounded-pill text-muted" style="font-size: 0.85rem;">
                <i class="bi bi-calendar3 me-2"></i> 
                <span id="navbar-current-date">Cargando...</span>
            </div>
        </div>

        <!-- Center Section: Search -->
        <div class="navbar-center flex-grow-1 mx-4">
            <div class="input-group" style="max-width: 350px;">
                <span class="input-group-text bg-light border-0 rounded-start-pill text-muted">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" class="form-control bg-light border-0 rounded-end-pill" placeholder="Buscar..." style="box-shadow: none;">
            </div>
        </div>

        <!-- Right Section: Notifications and User Dropdown -->
        <div class="navbar-right d-flex align-items-center gap-4">
            <!-- Notifications -->
            <i class="bi bi-bell position-relative fs-5 text-muted cursor-pointer">
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </i>

            <!-- User Dropdown -->
            <div class="dropdown">
                <div class="d-flex align-items-center gap-2 cursor-pointer" id="userDropdownToggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="rounded-circle text-white d-flex align-items-center justify-content-center" 
                         style="width: 38px; height: 38px; background: linear-gradient(135deg, #df7a48 0%, #e67e22 100%);">
                        <i class="bi bi-person fs-5"></i>
                    </div>
                    <div class="text-end" style="line-height: 1.2;">
                        <div class="fw-bold fs-6" id="navbar-user-name">Usuario</div>
                        <div class="text-muted" style="font-size: 0.75rem;" id="navbar-user-role">Rol</div>
                    </div>
                    <i class="bi bi-chevron-down ms-1 text-muted" style="font-size: 0.8rem;"></i>
                </div>

                <!-- Dropdown Menu -->
                <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="border: 1px solid #e8e0d7; border-radius: 12px; min-width: 250px;">
                    <li class="px-3 py-2 border-bottom">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <div class="rounded-circle text-white d-flex align-items-center justify-content-center" 
                                 style="width: 40px; height: 40px; background: linear-gradient(135deg, #df7a48 0%, #e67e22 100%);">
                                <i class="bi bi-person-fill fs-6"></i>
                            </div>
                            <div>
                                <div class="fw-bold small" id="navbar-dropdown-name">Usuario</div>
                                <div class="text-muted small" id="navbar-dropdown-role">Rol</div>
                            </div>
                        </div>
                        <div class="text-muted small">
                            <i class="bi bi-clock me-1"></i>
                            <span id="navbar-login-time">--:-- --</span>
                        </div>
                    </li>
                    <li class="border-bottom">
                        <a class="dropdown-item small" href="#" id="navbar-profile-link">
                            <i class="bi bi-person-gear me-2"></i> Mi Perfil
                        </a>
                    </li>
                    <li class="border-bottom">
                        <a class="dropdown-item small" href="#" id="navbar-settings-link">
                            <i class="bi bi-gear me-2"></i> Configuración
                        </a>
                    </li>
                    <li>
                        <button class="dropdown-item small text-danger w-100 text-start" id="navbar-logout-btn">
                            <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script>
        // Cargar información del usuario en la navbar
        function cargarInfoNavbar() {
            try {
                const usuarioJSON = localStorage.getItem("usuario");
                if (usuarioJSON) {
                    const usuario = JSON.parse(usuarioJSON);
                    
                    // Determinar nombre a mostrar
                    const nombreUsuario = usuario.nombre || usuario.correo.split('@')[0];
                    const rolUsuario = usuario.rol || 'Usuario';
                    
                    // Actualizar navbar principal
                    document.getElementById('navbar-user-name').textContent = nombreUsuario;
                    document.getElementById('navbar-user-role').textContent = rolUsuario;
                    
                    // Actualizar dropdown
                    document.getElementById('navbar-dropdown-name').textContent = nombreUsuario;
                    document.getElementById('navbar-dropdown-role').textContent = rolUsuario;
                    
                    // Mostrar hora de inicio de sesión
                    const loginDateTime = localStorage.getItem("loginDateTime");
                    if (loginDateTime) {
                        const date = new Date(loginDateTime);
                        document.getElementById('navbar-login-time').textContent = date.toLocaleTimeString('es-ES', {
                            hour: '2-digit',
                            minute: '2-digit',
                            hour12: true
                        });
                    }
                }
            } catch (e) {
                console.error("Error al cargar info de la navbar:", e);
            }
        }

        // Actualizar fecha actual
        function actualizarFecha() {
            const ahora = new Date();
            const opciones = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const fechaFormateada = ahora.toLocaleDateString('es-ES', opciones);
            // Capitalizar primera letra
            const fechaCapitalizada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
            document.getElementById('navbar-current-date').textContent = fechaCapitalizada;
        }

        // Cerrar sesión
        function cerrarSesionNavbar() {
            if (!confirm("¿Desea cerrar sesión?")) {
                return;
            }

            localStorage.removeItem("usuario");
            localStorage.removeItem("loginDateTime");
            localStorage.removeItem("loginEmailHistory");

            window.location.href = "/login";
        }

        // Event listeners
        document.getElementById('navbar-logout-btn').addEventListener('click', cerrarSesionNavbar);

        // Inicializar al cargar
        cargarInfoNavbar();
        actualizarFecha();

        // Actualizar fecha cada minuto
        setInterval(actualizarFecha, 60000);
    </script>
</body>

</html>
