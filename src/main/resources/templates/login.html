<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - RestoControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">

<body>
<div id="app">
    <div class="login-page">
        <div class="login-container">

            <div class="login-card">
                <div class="card-header">
                    <div class="logo-wrapper">
                        <i class="bi bi-shop"></i>
                    </div>
                    <h1 class="titulo">RestoControl</h1>
                    <p class="subtitulo">Sistema de Gestión Gastronómica</p>
                </div>

                <form @submit.prevent="iniciarSesion">
                    <div class="form-group email-input-wrapper">
                        <label class="form-label" for="correoInput">
                            <i class="bi bi-envelope"></i> Correo Electrónico
                        </label>
                        <input
                            id="correoInput"
                            v-model="correo"
                            @input="handleEmailInput"
                            @focus="showEmailSuggestions = true"
                            @blur="setTimeout(() => showEmailSuggestions = false, 200)"
                            type="email"
                            class="form-control"
                            placeholder="tu@correo.com"
                            required
                            autocomplete="email">
                        
                        <div :class="['email-suggestions', { show: showEmailSuggestions && emailSuggestions.length > 0 }]">
                            <div
                                v-for="email in emailSuggestions"
                                :key="email"
                                @click="selectEmail(email)"
                                class="email-suggestion-item">
                                <i class="bi bi-clock-history"></i>
                                {{ email }}
                            </div>
                        </div>
                    </div>

                    <div class="form-group password-group">
                        <label class="form-label" for="passwordInput">
                            <i class="bi bi-lock"></i> Contraseña
                        </label>
                        <input
                            id="passwordInput"
                            v-model="clave"
                            :type="showPassword ? 'text' : 'password'"
                            class="form-control password-input"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password">
                        <button
                            type="button"
                            class="toggle-password"
                            @click="showPassword = !showPassword"
                            :title="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
                            <i :class="['bi', showPassword ? 'bi-eye-slash' : 'bi-eye']"></i>
                        </button>
                    </div>

                    <div
                        v-if="mensajeError"
                        class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        {{ mensajeError }}
                    </div>

                    <button
                        type="submit"
                        class="btn btn-login"
                        :disabled="isLoading">
                        <span v-if="isLoading" class="loading-spinner"></span>
                        {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script th:src="@{/js/login.js}"></script>

</body>

</html>
