<!DOCTYPE html>
<html>
<head>
    <title>Estado Pedido</title>
    <meta charset="UTF-8">
</head>
<body>

    <h2>Registrar Estado Pedido</h2>

    <form id="formEstado">

        <label>Nombre Estado:</label>
        <input type="text" id="nombreEstado">

        <br><br>

        <button type="submit">
            Guardar
        </button>

    </form>

    <p id="mensaje"></p>

    <script>

        document.getElementById("formEstado")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const estado = {
                nombreEstado:
                    document.getElementById("nombreEstado").value
            };

            const respuesta = await fetch(
                "/estadospedidos",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(estado)
                }
            );

            const resultado =
                await respuesta.json();

            document.getElementById("mensaje")
                .innerHTML =
                "Guardado con ID: "
                + resultado.idEstadoPedido;
        });

    </script>

</body>
</html>
