<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
    <style>

        .login-page{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8f6f3;
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .titulo{
            color:#3d1f12;
            font-weight:700;
        }

        .subtitulo{
            color:#8b7f75;
        }

        .btn-login{
            background:#df7a48;
            color:white;
            border:none;
            height:50px;
            border-radius:12px;
        }

        .btn-login:hover{
            background:#cf6d3d;
        }

    </style>

<body>
<div id="app">
    <div class="login-page">
        <div class="login-card">
            <div class="text-center mb-4">
                <h1 class="titulo">
                    RestoControl
                </h1>
                <p class="subtitulo">
                    Sistema de Gestión
                </p>
            </div>
            <form @submit.prevent="iniciarSesion">
                <div class="mb-3">
                    <label class="form-label">
                        Correo Electrónico
                    </label>
                    <input
                        v-model="correo"
                        type="email"
                        class="form-control"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label">
                        Contraseña
                    </label>
                    <input
                        v-model="clave"
                        type="password"
                        class="form-control"
                        required>
                </div>
                <div
                    v-if="mensajeError"
                    class="alert alert-danger">
                    {{ mensajeError }}
                </div>
                <button
                    class="btn btn-login w-100">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script th:src="@{/js/login.js}"></script>

</body>

</html>
