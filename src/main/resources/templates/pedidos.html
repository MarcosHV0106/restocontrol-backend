<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{fragments/sidebar :: head('Dashboard - RestoControl')}">

    </head>

    <body>
        <div id="app">

            <div class="layout">

                <div th:replace="~{fragments/sidebar :: sidebar}"></div>

                <div class="main-content">
                    <main class="p-4 p-md-5">

                        <h2 class="mb-4">Toma de Pedido</h2>

                        <div class="pedido-container">

                            <!-- =========================
                                 PANEL IZQUIERDO
                            ========================== -->

                            <div class="productos-section">

                                <!-- DATOS SUPERIORES -->

                                <div class="row g-3 mb-4">

                                    <div class="col-md-3">
                                        <div class="info-card">
                                            <div class="titulo">Mesa</div>
                                            <div class="valor">Mesa 1</div>
                                        </div>
                                    </div>

                                    <div class="col-md-3">
                                        <div class="info-card">
                                            <div class="titulo">Fecha</div>
                                            <div class="valor">15/05/2026</div>
                                        </div>
                                    </div>

                                    <div class="col-md-3">
                                        <div class="info-card">
                                            <div class="titulo">Tiempo Transcurrido</div>
                                            <div class="valor">00:45 min</div>
                                        </div>
                                    </div>

                                    <div class="col-md-3">
                                        <div class="info-card">
                                            <div class="titulo">Mesero / Clientes</div>
                                            <div class="valor">Juan Díaz / 4</div>
                                        </div>
                                    </div>

                                </div>

                                <!-- CATEGORÍAS -->

                                <div class="mb-4">

                                    <button
                                        class="btn categoria-btn me-2"
                                        :class="categoriaSeleccionada === null
                                        ? 'btn-primary'
                                        : 'btn-outline-secondary'"
                                        @click="categoriaSeleccionada = null">

                                        Todo

                                    </button>

                                    <button
                                        v-for="categoria in categorias"
                                        :key="categoria.idCategoria"
                                        class="btn categoria-btn me-2"
                                        :class="categoriaSeleccionada === categoria.idCategoria
                                        ? 'btn-primary'
                                        : 'btn-outline-secondary'"
                                        @click="seleccionarCategoria(categoria.idCategoria)">

                                        {{ categoria.nombreCategoria }}

                                    </button>

                                </div>

                                <!-- PRODUCTOS -->

                                <div class="row g-4 product-grid">

                                    <div
                                        v-if="alimentosFiltrados.length === 0"
                                        class="col-12 text-center text-muted py-5">

                                        No hay alimentos disponibles.

                                    </div>

                                    <div class="col-md-4 col-lg-3"
                                         v-for="alimento in alimentosFiltrados"
                                         :key="alimento.idAlimento">



                                        <div class="card product-card" @click="agregarProducto(alimento)">

                                            <div class="product-image">
                                                <i class="bi bi-cup-hot"></i>
                                            </div>

                                            <div class="card-body">

                                                <div class="product-name">
                                                    {{ alimento.nombreAlimento }}
                                                </div>

                                                <div class="product-price">
                                                    S/ {{ Number(alimento.precio).toFixed(2) }}
                                                </div>

                                            </div>

                                        </div>

                                    </div>

                                </div>



                            </div>

                            <!-- =========================
                                     PANEL DERECHO
                                ========================== -->

                            <div class="pedido-sidebar">

                                <div class="pedido-sidebar">

                                    <div class="pedido-card">

                                        <div class="pedido-header">
                                            Detalle del Pedido
                                        </div>

                                        <div class="pedido-body">

                                            <div
                                                v-if="pedido.length === 0"
                                                class="text-center text-muted py-5">

                                                <i class="bi bi-cart-x fs-1 d-block mb-3"></i>

                                                No hay productos agregados

                                            </div>

                                            <template v-else>

                                                <div
                                                    v-for="item in pedido"
                                                    :key="item.idAlimento"
                                                    class="pedido-item">

                                                    <div class="pedido-item-info">

                                                        <div class="pedido-item-name">
                                                            {{ item.nombreAlimento }}
                                                        </div>

                                                        <div class="pedido-item-price">
                                                            S/ {{ item.precio.toFixed(2) }}
                                                        </div>

                                                    </div>

                                                    <div class="pedido-item-actions">

                                                        <button
                                                            class="btn btn-outline-secondary qty-btn"
                                                            @click="disminuirCantidad(item)">

                                                            <i class="bi bi-dash"></i>

                                                        </button>

                                                        <span class="qty-value">
                                                            {{ item.cantidad }}
                                                        </span>

                                                        <button
                                                            class="btn btn-outline-secondary qty-btn"
                                                            @click="aumentarCantidad(item)">

                                                            <i class="bi bi-plus"></i>

                                                        </button>

                                                    </div>

                                                    <div class="pedido-item-subtotal">

                                                        S/
                                                        {{
                            (item.precio * item.cantidad)
                                .toFixed(2)
                                                        }}

                                                    </div>

                                                </div>

                                                <hr>

                                                <div class="resumen-linea">

                                                    <span>Subtotal</span>

                                                    <span>
                                                        S/ {{ subtotal.toFixed(2) }}
                                                    </span>

                                                </div>

                                                <div class="resumen-linea">

                                                    <span>IGV (18%)</span>

                                                    <span>
                                                        S/ {{ igv.toFixed(2) }}
                                                    </span>

                                                </div>

                                                <hr>

                                                <div class="total-final">

                                                    <span>Total</span>

                                                    <span>
                                                        S/ {{ total.toFixed(2) }}
                                                    </span>

                                                </div>

                                                <button
                                                    class="btn btn-primary w-100 mt-4">

                                                    Confirmar Pedido

                                                </button>

                                                <button
                                                    class="btn btn-outline-secondary w-100 mt-2">

                                                    Cancelar

                                                </button>

                                            </template>

                                        </div>

                                    </div>

                                </div>

                            </div>
                        </div>

                    </main>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script th:src="@{/js/pedido.js}"></script>
        <script th:src="@{/js/logout.js}"></script>
    </body>
</html>
