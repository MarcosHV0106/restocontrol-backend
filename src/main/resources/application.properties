spring.config.import=optional:file:.env[.properties]

spring.application.name=RestoControl
spring.datasource.url=${DB_URL:jdbc:mysql://18.208.194.151:22222/restocontrol?serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:usuario}
spring.datasource.password=${DB_PASSWORD:usuario}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Logging y trazabilidad
logging.config=classpath:logback-spring.xml
logging.file.path=${LOG_PATH:logs}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.level.com.utp.RestoControl=${APP_LOG_LEVEL:INFO}
logging.level.com.utp.RestoControl.Logging.ServiceLoggingAspect=${SERVICE_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}
restocontrol.logging.http.enabled=${HTTP_REQUEST_LOG_ENABLED:true}
restocontrol.logging.request-id-header=${REQUEST_ID_HEADER:X-Request-ID}
restocontrol.logging.max-file-size=${LOG_MAX_FILE_SIZE:20MB}
restocontrol.logging.max-history=${LOG_MAX_HISTORY:30}
restocontrol.logging.audit-max-history=${AUDIT_LOG_MAX_HISTORY:90}
restocontrol.logging.total-size-cap=${LOG_TOTAL_SIZE_CAP:2GB}

# Seguridad, origenes permitidos y monitoreo
restocontrol.jwt.secret=${JWT_SECRET:}
restocontrol.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
restocontrol.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

restocontrol.frontend-url=${FRONTEND_URL:http://localhost:5173}
restocontrol.activation.token-hours=${ACTIVATION_TOKEN_HOURS:24}
restocontrol.mail-from-name=${MAIL_FROM_NAME:RestoControl Notificaciones}
