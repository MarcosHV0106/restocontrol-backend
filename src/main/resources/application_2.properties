spring.application.name=RestoControl
spring.datasource.url=jdbc:mysql://localhost:3306/restocontrol?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=010605
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

restocontrol.frontend-url=${FRONTEND_URL:http://localhost:5173}
restocontrol.activation.token-hours=${ACTIVATION_TOKEN_HOURS:24}
restocontrol.mail-from-name=${MAIL_FROM_NAME:RestoControl Notificaciones}
